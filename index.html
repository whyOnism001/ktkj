<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开投智云价格计算器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>☁️ 开投智云价格计算器</h1>
            <p>精准计算您的云资源成本 | 支持自定义折扣</p>
            <button class="theme-toggle" id="themeToggle" title="切换主题">🌓</button>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-group">
                <label>📅 计费月份</label>
                <input type="number" id="monthInput" min="1" max="120" value="1" placeholder="月">
            </div>
            <div class="control-group">
                <label>💰 折扣率(%)</label>
                <input type="number" id="discountInput" min="0" max="100" step="5" value="85" placeholder="折扣率">
            </div>
        </div>

        <!-- 安全服务快捷配置 -->
        <div class="control-panel" style="margin-top: -12px; padding-top: 0;">
            <div class="control-group" style="width: 100%;">
                <label style="margin-bottom: 4px;">🛡️ 安全服务一键配置</label>
                <div style="font-size: 0.8125rem; color: var(--text-tertiary); margin-bottom: 6px;">
                    根据云主机数量自动配置：主机安全、日志审计、防火墙、堡垒机
                </div>
                <button class="btn btn-danger" onclick="showSecurityConfigModal()" style="width: 100%; padding: 10px;">
                    🔒 一键配置安全服务
                </button>
            </div>
        </div>

        <!-- 常用服务推荐栏 -->
        <div class="recommend-bar">
            <div class="recommend-title">常用服务推荐</div>
            <div class="recommend-list" id="recommendList">
                <!-- 动态生成推荐服务 -->
            </div>
        </div>

        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 服务选择面板 -->
            <div class="service-panel">
                <div class="category-tabs" id="categoryTabs">
                    <!-- 动态生成分类标签 -->
                </div>
                <div class="services-list" id="servicesList">
                    <!-- 动态生成服务列表 -->
                </div>
            </div>

            <!-- 结果面板 -->
            <div class="result-panel">
                <div class="result-header">
                    <div class="result-title">费用明细</div>
                    <div class="result-period" id="resultPeriod">计费周期：1个月</div>
                </div>

                <div class="selected-services" id="selectedServices">
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <div class="empty-state-text">请在左侧选择服务并添加</div>
                    </div>
                </div>

                <div class="summary-section">
                    <div class="summary-row">
                        <span>服务项数</span>
                        <span id="serviceCount">0</span>
                    </div>
                    <div class="summary-row">
                        <span>原价总计</span>
                        <span id="originalTotal">¥0.00</span>
                    </div>
                    <div class="summary-row" id="discountRow" style="display: none;">
                        <span>折扣后总计</span>
                        <span id="discountTotal" style="color: var(--success-500); font-weight: 700;">¥0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>应付金额</span>
                        <span id="finalTotal">¥0.00</span>
                    </div>
                    <div class="savings" id="savings" style="display: none;"></div>

                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="copyResult()">📋 复制结果</button>
                        <button class="btn btn-secondary" onclick="resetAll()">🔄 重置</button>
                    </div>

                    <!-- 额外功能按钮 -->
                    <div class="action-buttons-extra">
                        <button class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
                        <button class="btn btn-warning" onclick="loadConfig()">📂 加载配置</button>
                    </div>

                    <div class="action-buttons-extra">
                        <button class="btn btn-primary" onclick="exportToExcel()">📊 导出Excel</button>
                        <button class="btn btn-secondary" onclick="exportToJSON()">📄 导出JSON</button>
                    </div>

                    <!-- 安全服务一键配置 -->
                    <div class="action-buttons-extra" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">标题</div>
            <div class="modal-body" id="modalBody">内容</div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="toast" id="toast"></div>

    <!-- 通知提示 -->
    <div class="notification" id="notification">
        <div class="notification-title" id="notificationTitle"></div>
        <div class="notification-message" id="notificationMessage"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
